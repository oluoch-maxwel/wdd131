<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Temple Album - OLUOCH OCHIENG</title>
    <meta name="description"
        content="WDD 131 – Dynamic Web Fundamentals. Learn HTML, CSS, JavaScript, responsive web design, and dynamic web development concepts.">
    <meta name="author" content="OLUOCH OCHIENG">
    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>
</head>

<body>
    <div class="wrapper">
        <header>
            <h1>Kenya</h1>
        </header>

        <main>
            <section class="hero-section">
                <section class="hero-img">
                    <img src="images/kenya-big-five.webp"
                        srcset="images/kenya-400.webp 400w, images/kenya-800.webp 800w, images/kenya-1200.webp 1200w"
                        sizes="100vw" alt="Kenya Big Five">
                </section>

                <section class="data">
                    <div class="badge data-header">
                        <h2>Data</h2>
                    </div>
                    <article class="data-info"><span class="data-info2">Area:</span> <span>580,367 km²</span></article>
                    <article class="data-info"><span class="data-info2">Population:</span> <span>~55 Million</span>
                    </article>
                    <article class="data-info"><span class="data-info2">Capital:</span> <span>Nairobi</span></article>
                    <article class="data-info"><span class="data-info2">Language:</span> <span>English / Swahili</span>
                    </article>
                    <article class="data-info"><span class="data-info2">Currency:</span> <span>Kenyan Shilling</span>
                    </article>
                    <article class="data-info"><span class="data-info2">Time Zone:</span> <span>UTC+3</span></article>
                    <article class="data-info"><span class="data-info2">Calling Code:</span> <span>+254</span></article>
                    <article class="data-info"><span class="data-info2">Internet TLD:</span> <span>.ke</span></article>
                </section>

                <section class="weather">
                    <div class="badge weather-header"> <!-- Fixed: Removed icon-em class from wrapper -->
                        <h2>Weather</h2>
                        <span class="icon-em rain-icon"></span> <!-- Fixed: Applied icon-em directly to emoji span -->
                    </div>
                    <article class="data-info"><span class="data-info2">Temperature:</span> <span>10°C</span></article>
                    <article class="data-info"><span class="data-info2">Conditions:</span> <span>Partly Cloudy</span>
                    </article>
                    <article class="data-info"><span class="data-info2">Wind:</span> <span id="windspeed"></span>
                    </article>
                    <article class="data-info"><span class="data-info2">Wind Chill:</span> <span id="temperature"></span>
                    </article>
                </section>
            </section>
        </main>

        <footer>
            <p><span id="currentyear"></span> 🌺 Oluoch Maxwel Ochieng 🌺 Kenya</p>
            <p><span id="lastModified"></span></p>
        </footer>
    </div>
</body>

</html>
